<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Sahyog India</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #17211c;
      --muted: #66756d;
      --paper: #fbfaf5;
      --green: #116149;
      --green-deep: #0b3d30;
      --red: #d94444;
      --line: rgba(23, 33, 28, 0.13);
      --shadow: 0 24px 70px rgba(16, 32, 26, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(7,20,16,0.88), rgba(7,20,16,0.48)),
        url("https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&w=1600&q=82") center/cover;
    }

    .card {
      width: min(100%, 460px);
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      background: rgba(255,255,255,0.96);
      box-shadow: var(--shadow);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
      font-weight: 800;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      font-weight: 900;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.1;
      font-weight: 800;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 50px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(17,97,73,0.12);
    }

    .btn {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--green-deep);
    }

    .error {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 8px;
      color: #8a1f1f;
      background: rgba(217,68,68,0.12);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .back {
      display: block;
      margin-top: 20px;
      color: var(--green);
      text-align: center;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <main class="card">
    <a class="brand" href="/">
      <span class="brand-mark">S</span>
      <span>Sahyog India</span>
    </a>

    {% if show_reset %}
      <h1>Create new password</h1>
      <p>Enter a new password for {{ email }}.</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <input type="hidden" name="step" value="reset_password" />
        <input type="hidden" name="email" value="{{ email }}" />

        <div class="field">
          <label for="new_password">New password</label>
          <input id="new_password" type="password" name="new_password" required placeholder="Enter new password" />
        </div>

        <div class="field">
          <label for="confirm_password">Confirm password</label>
          <input id="confirm_password" type="password" name="confirm_password" required placeholder="Confirm new password" />
        </div>

        <button class="btn" type="submit">Update password</button>
      </form>
    {% else %}
      <h1>Forgot password?</h1>
      <p>Enter your account email and reset your password securely.</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <input type="hidden" name="step" value="check_email" />

        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" name="email" required placeholder="you@example.com" />
        </div>

        <button class="btn" type="submit">Continue</button>
      </form>
    {% endif %}

    <a class="back" href="/login">Back to login</a>
  </main>
</body>
</html>
